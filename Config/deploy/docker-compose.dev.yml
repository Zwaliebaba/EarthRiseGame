# Dev inner-loop compose — runs ERServer in a Windows container.
# SQL Server is an external network service (host machine or LAN); not containerised.
#
# Prerequisites:
#   - Docker Desktop with Windows containers mode
#   - A SQL Server instance on the host (Developer edition is free)
#     with a database named 'EarthRise' and schema from Config/db/schema.sql applied.
#   - Create a real erserver.config.json (copy Config/erserver.config.example.json
#     and fill in the connection string + server pepper). It is gitignored — never
#     commit secrets. The compose file mounts it into the container read-only.
#
# Usage:
#   docker compose -f Config/deploy/docker-compose.dev.yml up

version: "3.9"

services:
  erserver:
    build:
      # context is the repo root (two levels up from Config/deploy/) so the
      # Dockerfile's `COPY . .` picks up the full solution source.
      context: ../..
      dockerfile: Config/deploy/Dockerfile
    image: earthrise-server:dev
    ports:
      - "7777:7777/udp"
    volumes:
      # Mount the real (gitignored) config holding the connection string + pepper.
      # ERServer reads it from its working directory (C:\app). ${ER_CONFIG:-...}
      # lets you point at a different host path; the default is repo-root local.
      - "${ER_CONFIG:-../../erserver.config.json}:C:/app/erserver.config.json:ro"
    # host.docker.internal resolves to the host machine on Docker Desktop
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
